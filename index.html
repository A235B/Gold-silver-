<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold & Silver Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Gold & Silver Live Dashboard</h1>
    </header>
    <main>
        <section id="prices">
            <h2>Live Prices</h2>
            <div id="gold-price">Gold: Loading...</div>
            <div id="silver-price">Silver: Loading...</div>
        </section>

        <section id="charts">
            <h2>Major Targets & Pullbacks</h2>
            <div id="gold-zones">Gold zones loading...</div>
            <div id="silver-zones">Silver zones loading...</div>
        </section>

        <section id="news">
            <h2>Latest News & Impact</h2>
            <div id="news-feed">News loading...</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
  </html>
